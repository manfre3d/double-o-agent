<main class="hq">
  <header class="hq-header">
    <h1 class="hq-title">Double-O Agent</h1>
    <p class="hq-subtitle">HQ &mdash; live link to Control</p>
  </header>

  <section class="status-report" aria-live="polite">
    <h2 class="status-heading">Control status</h2>
    @if (controlStatus.error()) {
      <p class="status-line status-line--down">No response from Control.</p>
    } @else if (controlStatus.value(); as report) {
      <p class="status-line">
        <span class="status-codename">[{{ report.codename }}]</span>
        {{ report.message }}
      </p>
    } @else {
      <p class="status-line">Contacting Control&hellip;</p>
    }
  </section>
</main>
