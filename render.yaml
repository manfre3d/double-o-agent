# Render Blueprint — one web service: Control serves the API and HQ's built
# bundle from the same origin. Postgres lives on Neon; paste its connection
# string as DATABASE_URL when Render prompts for it.
services:
  - type: web
    name: double-o-agent
    runtime: node
    plan: free
    # Next to the Neon Postgres (AWS eu-central-1) — app↔DB latency dominates.
    region: frankfurt
    buildCommand: npm ci && npm run build
    # Migrations run before boot so the schema always matches the code.
    startCommand: npx prisma migrate deploy && npm run start:prod --workspace=control
    healthCheckPath: /api/status
    # Deploy only after the GitHub Actions run on main is green.
    autoDeployTrigger: checksPass
    envVars:
      - key: NODE_VERSION
        value: "24"
      # Production toggles Secure, '__Host-'-prefixed session cookies.
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      # Signs the anonymous per-session cookie that isolates each visitor's
      # missions. Render generates a strong value once and keeps it stable.
      - key: SESSION_COOKIE_SECRET
        generateValue: true
      # Missions (and their events) are purged this many hours after they start.
      - key: MISSION_RETENTION_HOURS
        value: "72"
      # Optional. With a key set, missions run live by default and visitors can
      # still choose demo per mission; leave empty to force demo for everyone.
      - key: OPENAI_API_KEY
        sync: false
