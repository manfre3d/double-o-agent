services:
  db:
    image: postgres:17-alpine
    container_name: double-o-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-doubleo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-doubleo}
      POSTGRES_DB: ${POSTGRES_DB:-double_o}
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER}']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db-data:
